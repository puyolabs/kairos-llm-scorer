# Local topology — CLUSTER (multi-project host, Janus gateway).
#
#   docker compose -f infra/local/cluster/docker-compose.yml up -d --wait
#
# The cluster is a SINGLE nginx edge (Janus). The scorer is a
# PURELY INTERNAL service — only the kairos worker calls it (server-to-server) over
# the dedicated private `kairos-scorer` network. The scorer gets NO Janus ingress at
# all (no public, no LAN surface), so there is no inner proxy and no route fragment.
# This stack binds NO host ports. The scorer joins `kairos-scorer` with the stable
# alias `kairos-llm-scorer` so the kairos worker can reach it by that name.
#
# `kairos-scorer` is OWNED by kairos (kairos creates it); this repo is a MEMBER and
# joins it as `external: true` — it does NOT create the network.
name: kairos-llm-scorer

# Pull in the shared scorer service. Its relative paths resolve from infra/.
include:
  - ../../docker-compose.base.yml

services:
  # Extend the scorer service from base.yml: attach it to the dedicated kairos ↔
  # scorer private network with the alias the kairos worker dials, keeping it on the
  # compose `default` network too.
  scorer:
    networks:
      default:
      kairos-scorer:
        aliases:
          - kairos-llm-scorer

networks:
  # Dedicated private network for kairos-worker ↔ scorer. This repo is a MEMBER of
  # the `kairos-scorer` network; it is created out-of-band by the OWNER (kairos) —
  # not here:
  #   docker network create kairos-scorer
  kairos-scorer:
    external: true
